<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FolioCraft — Build Stunning Portfolios With Zero Dependencies</title>
  <link rel="stylesheet" href="src/styles/foliocraft.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--fc-background, #fff);
      color: var(--fc-text, #1f2937);
      line-height: 1.6;
      transition: background-color 0.3s, color 0.3s;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { createPortfolio } from './src/index.js';

    const portfolio = createPortfolio({
      target: '#app',
      name: 'Alex Chen',
      title: 'Full-Stack Developer',
      theme: 'light',

      navbar: {
        brand: 'Alex Chen',
        links: [
          { text: 'Projects', href: '#fc-projects' },
          { text: 'Skills', href: '#fc-skills' },
          { text: 'Experience', href: '#fc-experience' },
          { text: 'Contact', href: '#fc-contact' },
          { text: 'Docs', href: 'docs.html' },
          { text: 'Examples', href: 'examples.html' },
        ]
      },

      hero: {
        headline: 'I craft digital experiences that people love.',
        subheadline: 'Full-Stack Developer specializing in React, Node.js, and cloud architecture. Building fast, accessible, and beautiful web applications.',
        cta: {
          text: 'View My Work',
          href: '#fc-projects',
          secondary: { text: 'Get In Touch', href: '#fc-contact' }
        },
        socials: [
          { platform: 'github', url: '#' },
          { platform: 'linkedin', url: '#' },
          { platform: 'twitter', url: '#' },
          { platform: 'email', url: 'mailto:alex@example.com' },
        ],
        layout: 'centered',
        animated: true
      },

      stats: [
        { value: 50, label: 'Projects Shipped', suffix: '+' },
        { value: 30, label: 'Happy Clients', suffix: '+' },
        { value: 5, label: 'Years Experience' },
        { value: 12, label: 'Open Source Repos' },
      ],

      projects: [
        {
          title: 'E-Commerce Platform',
          description: 'Full-stack marketplace with real-time inventory, Stripe payments, and an admin dashboard serving 10K+ daily users.',
          tags: ['React', 'Node.js', 'PostgreSQL', 'Stripe'],
          links: { demo: '#', source: '#' },
          featured: true
        },
        {
          title: 'Weather Dashboard',
          description: 'Interactive weather visualization with 7-day forecasts, location search, and responsive D3.js charts.',
          tags: ['Vue.js', 'D3.js', 'OpenWeather API'],
          links: { demo: '#', source: '#' }
        },
        {
          title: 'Real-Time Chat',
          description: 'WebSocket-powered messaging app with rooms, file sharing, read receipts, and end-to-end encryption.',
          tags: ['React', 'Socket.io', 'MongoDB'],
          links: { demo: '#', source: '#' }
        },
        {
          title: 'Design System',
          description: 'Component library with 40+ components, design tokens, accessibility baked in, and Storybook documentation.',
          tags: ['React', 'TypeScript', 'Storybook'],
          links: { demo: '#', source: '#' }
        },
        {
          title: 'ML Pipeline Runner',
          description: 'Automated machine learning pipeline with model versioning, evaluation dashboards, and one-click deployment.',
          tags: ['Python', 'FastAPI', 'Docker'],
          links: { source: '#' }
        },
        {
          title: 'Task Manager CLI',
          description: 'Developer-focused productivity tool for managing projects and tasks from the terminal with Git integration.',
          tags: ['Go', 'SQLite', 'CLI'],
          links: { source: '#' }
        }
      ],

      skills: [
        {
          title: 'Frontend',
          skills: [
            { name: 'JavaScript / TypeScript', level: 95, color: '#f0db4f' },
            { name: 'React / Next.js', level: 92, color: '#61dafb' },
            { name: 'CSS / Tailwind', level: 88, color: '#38bdf8' },
            { name: 'Vue.js', level: 75, color: '#42b883' },
          ]
        },
        {
          title: 'Backend & DevOps',
          skills: [
            { name: 'Node.js', level: 90, color: '#68a063' },
            { name: 'Python', level: 85, color: '#3776ab' },
            { name: 'PostgreSQL / MongoDB', level: 80, color: '#336791' },
            { name: 'Docker / AWS', level: 72, color: '#2496ed' },
          ]
        }
      ],

      experience: [
        {
          title: 'Senior Frontend Engineer',
          subtitle: 'Acme Corp',
          date: '2023',
          dateEnd: 'Present',
          description: 'Leading the design system team across 3 product squads. Mentoring junior developers and driving frontend architecture decisions that improved Core Web Vitals by 40%.',
          tags: ['React', 'TypeScript', 'Design Systems', 'Performance'],
          dotColor: '#3b82f6'
        },
        {
          title: 'Full-Stack Developer',
          subtitle: 'StartupXYZ',
          date: '2020',
          dateEnd: '2023',
          description: 'Built the customer-facing platform from scratch. Grew the product from 0 to 50K monthly active users. Implemented CI/CD pipeline and monitoring.',
          tags: ['Vue.js', 'Node.js', 'AWS', 'PostgreSQL'],
          dotColor: '#10b981'
        },
        {
          title: 'Junior Developer',
          subtitle: 'Digital Agency',
          date: '2018',
          dateEnd: '2020',
          description: 'Delivered responsive websites and landing pages for 20+ clients. Introduced component-based architecture and automated testing to the team.',
          tags: ['JavaScript', 'HTML/CSS', 'WordPress', 'PHP'],
          dotColor: '#8b5cf6'
        }
      ],

      contact: {
        onSubmit: async (data) => {
          await new Promise(r => setTimeout(r, 1500));
          console.log('Form submitted:', data);
        },
        successMessage: 'Thanks for reaching out! I\'ll get back to you within 24 hours.'
      },

      footer: {
        brand: 'Alex Chen',
        tagline: 'Building the web, one component at a time.',
        links: [
          { text: 'Docs', href: 'docs.html' },
          { text: 'Examples', href: 'examples.html' },
        ],
        socials: [
          { platform: 'github', url: '#' },
          { platform: 'linkedin', url: '#' },
          { platform: 'twitter', url: '#' },
        ]
      }
    });
  </script>
</body>
</html>
